name: C++ Build & Test

on:
  push:
    branches: [ master, main ]
    paths:
      - 'cpp/**'
      - '.github/workflows/cpp-tests.yml'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'cpp/**'
      - '.github/workflows/cpp-tests.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libeigen3-dev

      - name: Configure CMake
        run: cmake -B cpp/build -S cpp

      - name: Build
        run: cmake --build cpp/build

      - name: Run tests
        run: cd cpp/build && ctest --verbose --output-on-failure
